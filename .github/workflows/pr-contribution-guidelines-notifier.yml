name: 'Contribution Guidelines Notifier'

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Thanks for your pull request! Please ensure you have read our contribution guidelines and that your changes follow our coding standards. You can run \`make lint\` and \`make test\` locally to verify your changes.`
            })
